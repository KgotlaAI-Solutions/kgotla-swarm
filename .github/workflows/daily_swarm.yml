name: Kgotla Daily Intelligence Swarm

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-swarm:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Intelligence Swarm
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
          HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}
        run: python main.py

      - name: Save brief to repo
        run: |
          git config user.name "Kgotla Swarm Bot"
          git config user.email "mahlo@kgotlaai.co.za"
          git add briefs/
          git diff --staged --quiet || git commit -m "Daily brief $(date +%Y-%m-%d)"
          git pull --rebase origin main
          git push
