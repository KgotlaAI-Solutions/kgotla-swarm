<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kgotla AI — Intelligence Brief</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C96A;
    --gold-dim: #7A6330;
    --obsidian: #0A0A0A;
    --obsidian-2: #111111;
    --obsidian-3: #1A1A1A;
    --obsidian-4: #222222;
    --obsidian-5: #2A2A2A;
    --text: #E8E4DC;
    --text-dim: #8A8580;
    --text-muted: #504E4A;
    --red: #C0392B;
    --orange: #D4851A;
    --green: #2E7D52;
    --border: rgba(201,168,76,0.15);
    --border-bright: rgba(201,168,76,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--obsidian);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(201,168,76,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201,168,76,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrap { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 24px 80px; }

  /* ── HEADER ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 32px 0 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .logo-block { display: flex; align-items: center; gap: 14px; }

  .hex {
    width: 44px; height: 44px;
    background: var(--gold);
    clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 700; font-size: 20px;
    color: var(--obsidian);
    flex-shrink: 0;
  }

  .brand-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px; font-weight: 600;
    color: var(--gold);
    letter-spacing: 0.04em;
  }

  .brand-sub {
    font-size: 11px; font-weight: 400;
    color: var(--text-dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .header-right { text-align: right; }

  #brief-date {
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px; color: var(--gold-dim);
    letter-spacing: 0.06em;
  }

  .live-dot {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--text-dim);
    letter-spacing: 0.08em; text-transform: uppercase;
    margin-top: 4px;
  }

  .live-dot::before {
    content: '';
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--gold);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── LOADING ── */
  #loading {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 60vh; gap: 20px;
  }

  .loader-hex {
    width: 56px; height: 56px;
    background: var(--gold);
    clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
    animation: spin 3s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  #loading p { color: var(--text-dim); font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase; }

  /* ── EXECUTIVE SUMMARY ── */
  .summary-block {
    margin: 40px 0 32px;
    padding: 28px 32px;
    border: 1px solid var(--border-bright);
    border-left: 3px solid var(--gold);
    background: var(--obsidian-2);
    position: relative;
  }

  .summary-block::before {
    content: 'Intelligence Summary';
    position: absolute; top: -10px; left: 20px;
    background: var(--obsidian);
    padding: 0 10px;
    font-size: 10px; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--gold);
  }

  .summary-block p {
    font-family: 'Cormorant Garamond', serif;
    font-size: 19px; line-height: 1.7;
    color: var(--text); font-weight: 400;
  }

  /* ── SECTOR SCORES ── */
  .scores-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 40px;
  }

  .score-card {
    background: var(--obsidian-3);
    border: 1px solid var(--border);
    padding: 18px 16px 14px;
    text-align: center;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .score-card:hover { border-color: var(--border-bright); }

  .score-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0;
    height: 2px;
    background: var(--gold);
    transition: width 0.8s ease;
  }

  .score-label {
    font-size: 10px; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--text-dim);
    margin-bottom: 8px;
  }

  .score-val {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px; font-weight: 700;
    color: var(--gold); line-height: 1;
  }

  .score-sub { font-size: 10px; color: var(--text-muted); margin-top: 4px; }

  /* ── SECTION HEADINGS ── */
  .section-title {
    font-size: 10px; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--gold-dim);
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 12px;
  }

  .section-title::after {
    content: ''; flex: 1;
    height: 1px; background: var(--border);
  }

  /* ── OPPORTUNITIES ── */
  .opps-grid { display: flex; flex-direction: column; gap: 12px; margin-bottom: 40px; }

  .opp-card {
    background: var(--obsidian-3);
    border: 1px solid var(--border);
    padding: 20px 24px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 16px;
    align-items: start;
    transition: border-color 0.2s, background 0.2s;
    cursor: default;
  }

  .opp-card:hover {
    border-color: var(--border-bright);
    background: var(--obsidian-4);
  }

  .urgency-pip {
    width: 8px; height: 8px; border-radius: 50%;
    margin-top: 6px; flex-shrink: 0;
  }

  .urgency-pip.critical { background: var(--red); box-shadow: 0 0 8px var(--red); }
  .urgency-pip.high     { background: var(--orange); box-shadow: 0 0 8px var(--orange); }
  .urgency-pip.medium   { background: var(--gold); }

  .opp-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px; font-weight: 600;
    color: var(--text); margin-bottom: 6px;
  }

  .opp-meta {
    font-size: 11px; color: var(--text-dim);
    letter-spacing: 0.06em; text-transform: uppercase;
    margin-bottom: 10px;
  }

  .opp-meta span { color: var(--gold-dim); }

  .opp-action {
    font-size: 13px; color: var(--text-dim);
    border-left: 2px solid var(--border-bright);
    padding-left: 12px; line-height: 1.5;
  }

  .opp-value {
    text-align: right; flex-shrink: 0;
  }

  .opp-value-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px; font-weight: 700; color: var(--gold);
    white-space: nowrap;
  }

  .opp-deadline {
    font-size: 10px; color: var(--text-muted);
    margin-top: 4px; white-space: nowrap;
  }

  /* ── THREATS ── */
  .threats-grid { display: flex; flex-direction: column; gap: 12px; margin-bottom: 40px; }

  .threat-card {
    background: var(--obsidian-3);
    border: 1px solid rgba(192,57,43,0.2);
    border-left: 3px solid var(--red);
    padding: 18px 22px;
  }

  .threat-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px; font-weight: 600;
    color: #E07060; margin-bottom: 6px;
  }

  .threat-impact { font-size: 13px; color: var(--text-dim); margin-bottom: 8px; }

  .threat-mitigation {
    font-size: 12px; color: var(--text-muted);
    padding: 8px 12px;
    background: rgba(201,168,76,0.04);
    border: 1px solid var(--border);
  }

  .threat-mitigation::before {
    content: '↳ Mitigation: ';
    color: var(--gold-dim); font-weight: 500;
  }

  /* ── OUTREACH ── */
  .outreach-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 12px;
    margin-bottom: 40px;
  }

  .outreach-card {
    background: var(--obsidian-3);
    border: 1px solid var(--border);
    padding: 18px 20px;
    display: flex; gap: 14px; align-items: start;
    transition: border-color 0.2s;
  }

  .outreach-card:hover { border-color: var(--border-bright); }

  .outreach-icon {
    width: 32px; height: 32px; flex-shrink: 0;
    background: var(--obsidian-5);
    border: 1px solid var(--border-bright);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }

  .outreach-entity {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px; font-weight: 600; color: var(--text);
  }

  .outreach-reason { font-size: 12px; color: var(--text-dim); margin-top: 4px; }

  .outreach-approach {
    display: inline-block; margin-top: 8px;
    font-size: 10px; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--gold);
    border: 1px solid var(--gold-dim);
    padding: 2px 8px;
  }

  /* ── FOOTER ── */
  footer {
    border-top: 1px solid var(--border);
    padding-top: 24px;
    display: flex; align-items: center; justify-content: space-between;
    font-size: 11px; color: var(--text-muted);
    letter-spacing: 0.08em;
  }

  footer a { color: var(--gold-dim); text-decoration: none; }
  footer a:hover { color: var(--gold); }

  @media (max-width: 640px) {
    .scores-row { grid-template-columns: repeat(2, 1fr); }
    .opp-card { grid-template-columns: auto 1fr; }
    .opp-value { display: none; }
    header { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo-block">
      <div class="hex">K</div>
      <div>
        <div class="brand-name">Kgotla AI</div>
        <div class="brand-sub">Intelligence Operations Centre</div>
      </div>
    </div>
    <div class="header-right">
      <div id="brief-date">Loading...</div>
      <div class="live-dot">Live Brief</div>
    </div>
  </header>

  <div id="loading">
    <div class="loader-hex"></div>
    <p>Fetching intelligence brief...</p>
  </div>

  <div id="content" style="display:none">

    <div class="summary-block">
      <p id="exec-summary"></p>
    </div>

    <div class="scores-row" id="scores-row"></div>

    <div class="section-title">Top Opportunities</div>
    <div class="opps-grid" id="opps-grid"></div>

    <div class="section-title">Threats to Monitor</div>
    <div class="threats-grid" id="threats-grid"></div>

    <div class="section-title">Recommended Outreach Today</div>
    <div class="outreach-grid" id="outreach-grid"></div>

  </div>

  <footer>
    <span>Kgotla AI Consulting PTY Ltd — <a href="https://kgotlaai.co.za">kgotlaai.co.za</a></span>
    <span>Intelligence Swarm v1 · Updated daily 06:00 SAST</span>
  </footer>

</div>

<script>
const BRIEF_URL = "https://raw.githubusercontent.com/KgotlaAI-Solutions/kgotla-swarm/refs/heads/main/briefs/latest.json";

const APPROACH_ICONS = { email: "✉", phone: "☎", linkedin: "in", tender_portal: "⊞" };
const SECTOR_LABELS  = { mining: "Mining", energy: "Energy", government: "Government", enterprise: "Enterprise" };

async function loadBrief() {
  try {
    const res = await fetch(BRIEF_URL);
    if (!res.ok) throw new Error("Fetch failed: " + res.status);
    const brief = await res.json();
    render(brief);
  } catch (e) {
    document.getElementById("loading").innerHTML =
      `<p style="color:var(--red)">Could not load brief: ${e.message}</p>`;
  }
}

function render(b) {
  document.getElementById("loading").style.display = "none";
  document.getElementById("content").style.display = "block";

  // Date
  const d = new Date(b.date);
  document.getElementById("brief-date").textContent =
    d.toLocaleDateString("en-ZA", { weekday:"long", year:"numeric", month:"long", day:"numeric" });

  // Summary
  document.getElementById("exec-summary").textContent = b.executive_summary;

  // Sector scores
  const scores = b.sector_scores || {};
  const scoresEl = document.getElementById("scores-row");
  Object.entries(scores).forEach(([sector, score]) => {
    const pct = (parseInt(score) / 10) * 100;
    const card = document.createElement("div");
    card.className = "score-card";
    card.style.setProperty("--pct", pct + "%");
    card.innerHTML = `
      <div class="score-label">${SECTOR_LABELS[sector] || sector}</div>
      <div class="score-val">${score}</div>
      <div class="score-sub">Activity / 10</div>
    `;
    card.style.cssText += ``;
    // Animate the bottom bar
    setTimeout(() => { card.style.cssText += `--bar-w:${pct}%;`; }, 100);
    card.querySelector(".score-val").style.cssText = `
      font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:700;
      color:var(--gold);line-height:1;
    `;
    // Set the ::after width via JS since we can't use CSS vars in pseudo
    const style = document.createElement("style");
    style.textContent = `.score-card:nth-child(${scoresEl.children.length + 1})::after { width: ${pct}%; }`;
    document.head.appendChild(style);
    scoresEl.appendChild(card);
  });

  // Opportunities
  const oppsEl = document.getElementById("opps-grid");
  (b.top_opportunities || []).forEach(opp => {
    const urgency = (opp.urgency || "medium").toLowerCase();
    const card = document.createElement("div");
    card.className = "opp-card";
    card.innerHTML = `
      <div class="urgency-pip ${urgency}"></div>
      <div>
        <div class="opp-title">${opp.title}</div>
        <div class="opp-meta">
          <span>${(opp.sector || "").toUpperCase()}</span> · ${urgency.toUpperCase()} URGENCY
        </div>
        <div class="opp-action">${opp.action}</div>
      </div>
      <div class="opp-value">
        <div class="opp-value-num">${opp.value_estimate_zar || "—"}</div>
        <div class="opp-deadline">${opp.deadline ? "By " + opp.deadline : "Open"}</div>
      </div>
    `;
    oppsEl.appendChild(card);
  });

  // Threats
  const threatsEl = document.getElementById("threats-grid");
  (b.top_threats || []).forEach(threat => {
    const card = document.createElement("div");
    card.className = "threat-card";
    card.innerHTML = `
      <div class="threat-title">${threat.title}</div>
      <div class="threat-impact">${threat.impact}</div>
      <div class="threat-mitigation">${threat.mitigation}</div>
    `;
    threatsEl.appendChild(card);
  });

  // Outreach
  const outreachEl = document.getElementById("outreach-grid");
  (b.recommended_outreach || []).forEach(rec => {
    const approach = (rec.contact_approach || "email").toLowerCase();
    const icon = APPROACH_ICONS[approach] || "→";
    const card = document.createElement("div");
    card.className = "outreach-card";
    card.innerHTML = `
      <div class="outreach-icon">${icon}</div>
      <div>
        <div class="outreach-entity">${rec.entity}</div>
        <div class="outreach-reason">${rec.reason}</div>
        <span class="outreach-approach">${approach}</span>
      </div>
    `;
    outreachEl.appendChild(card);
  });
}

loadBrief();
</script>
</body>
</html>
